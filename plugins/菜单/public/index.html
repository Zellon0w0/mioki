<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜单可视化预览与编辑</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glow-bg">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <div class="app-layout">
    <!-- Left panel: config inputs -->
    <aside class="config-sidebar card">
      <div class="panel-header">
        <h2>菜单配置编辑</h2>
        <p>调整各项设置，右侧将实时渲染 HTML 预览</p>
      </div>

      <form id="config-form">
        <!-- Global Config Section -->
        <div class="config-section">
          <h3>全局参数</h3>
          <div class="form-group">
            <label for="field-enabled">启用状态</label>
            <label class="switch">
              <input type="checkbox" id="field-enabled" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="form-group">
            <label for="field-command">触发指令</label>
            <input type="text" id="field-command" required>
          </div>
          <div class="form-group">
            <label for="field-title">菜单大标题</label>
            <input type="text" id="field-title">
          </div>
          <div class="form-group">
            <label for="field-subtitle">菜单副标题</label>
            <input type="text" id="field-subtitle">
          </div>
          <div class="form-group">
            <label for="field-theme">视觉主题</label>
            <select id="field-theme">
              <option value="eva-02">EVA 二号机橙红战术</option>
              <option value="hatsune">初音绿玻璃拟态</option>
              <option value="cyberpunk">赛博朋克霓虹暗黑</option>
            </select>
          </div>
        </div>

        <!-- Categories List Section -->
        <div class="config-section">
          <div class="section-header">
            <h3>选项卡卡片列表</h3>
            <button type="button" class="btn btn-sm btn-secondary" id="add-category-btn">+ 新增卡片</button>
          </div>
          <div id="categories-container" class="categories-list">
            <!-- Categories will be rendered here dynamically -->
          </div>
        </div>

        <!-- Actions -->
        <div class="panel-actions">
          <button type="button" class="btn btn-secondary" id="reset-btn">重置修改</button>
          <button type="submit" class="btn btn-primary" id="save-btn">保存并重载配置</button>
        </div>
      </form>
    </aside>

    <!-- Right panel: real-time HTML preview -->
    <main class="preview-area">
      <div class="preview-toolbar card">
        <div class="toolbar-title">
          <span class="indicator active"></span>
          <span>实时 HTML 预览</span>
        </div>
        <div class="toolbar-actions">
          <button type="button" class="btn btn-sm btn-secondary" id="preview-png-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            生成实际 PNG 截图
          </button>
        </div>
      </div>

      <div class="preview-frame-container card">
        <!-- Rendered HTML template goes inside this iframe -->
        <iframe id="html-preview-iframe" style="width: 100%; height: 100%; border: none; background: transparent;"></iframe>
      </div>
    </main>
  </div>

  <!-- PNG Preview Modal -->
  <div id="png-modal" class="modal hide">
    <div class="modal-overlay"></div>
    <div class="modal-content card">
      <div class="modal-header">
        <h3>Puppeteer 真实渲染截图</h3>
        <button type="button" class="btn btn-icon close-modal-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-loading-text">正在生成截图，请稍候...</p>
        <img id="rendered-png-img" class="hide" alt="Rendered PNG Menu Image">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary close-modal-btn">关闭</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hide">
    <div class="toast-content">
      <span class="toast-message"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

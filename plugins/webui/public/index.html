<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mioki WebUI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background glow effects -->
  <div class="glow-bg">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <!-- Login Container -->
  <div id="login-container" class="card fade-in">
    <div class="login-header">
      <div class="logo">M</div>
      <h2>Mioki Bot WebUI</h2>
      <p>请输入安全 Token 以访问控制台</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label for="token-input">安全 Token</label>
        <input type="password" id="token-input" placeholder="输入控制台访问 Token" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">登录控制台</button>
      <p id="login-error" class="error-msg hide"></p>
    </form>
  </div>

  <!-- Main App Layout -->
  <div id="app-container" class="hide">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <span class="brand-logo">M</span>
          <span class="brand-name">Mioki Panel</span>
        </div>
        <button id="logout-btn" class="btn btn-icon" title="退出登录">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
      </div>

      <div class="sidebar-menu">
        <div id="system-pages-section" class="hide">
          <h3 class="menu-title">系统功能</h3>
          <ul id="system-pages-list" class="menu-list" style="margin-bottom: 1.5rem;">
            <!-- System pages injected here -->
          </ul>
        </div>

        <h3 class="menu-title">插件配置</h3>
        <ul id="plugin-list" class="menu-list">
          <!-- Plugin list items injected here -->
        </ul>
      </div>
      
      <div class="sidebar-footer">
        <div class="status-indicator online"></div>
        <span>Mioki 运行中</span>
      </div>
    </aside>

    <main class="main-content">
      <header class="content-header">
        <div>
          <h1 id="selected-plugin-title">选择插件</h1>
          <p id="selected-plugin-desc">从左侧选择一个插件以管理其配置</p>
        </div>
        <div class="header-actions">
          <span id="plugin-status-badge" class="badge hide">已启用</span>
        </div>
      </header>

      <section class="content-body">
        <div id="welcome-view" class="card welcome-card">
          <div class="welcome-icon">👋</div>
          <h2>欢迎使用 Mioki WebUI</h2>
          <p>请在左侧侧边栏中选择一个插件以编辑其配置信息。修改后保存，框架会自动热重载该插件使配置立即生效。</p>
        </div>

        <div id="editor-view" class="hide">
          <form id="config-form" class="config-form">
            <div id="form-fields" class="form-grid">
              <!-- Dynamically generated fields go here -->
            </div>
            
            <div class="form-actions card">
              <button type="button" id="reset-btn" class="btn btn-secondary">重置修改</button>
              <button type="submit" id="save-btn" class="btn btn-primary">
                <span>保存并重载插件</span>
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <!-- Dynamic pages container -->
    <div id="iframe-container" class="hide" style="width: 100%; height: 100%; overflow: hidden;">
      <iframe id="page-iframe" src="" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hide">
    <div class="toast-content">
      <span class="toast-message"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
